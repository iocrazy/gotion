<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2A35"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="104" ry="104" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Checkmark / tick - red accent -->
  <path d="M 148 272 L 220 344 L 364 184" fill="none" stroke="#F87171" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small dot - bottom right accent -->
  <circle cx="380" cy="380" r="18" fill="#F87171" opacity="0.6"/>
</svg>
