services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: sqlite:/data/gotion.db?mode=rwc
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      XUNHU_APPID: ${XUNHU_APPID:-}
      XUNHU_APPSECRET: ${XUNHU_APPSECRET:-}
      XUNHU_NOTIFY_URL: ${XUNHU_NOTIFY_URL:-}
      WEBSITE_ORIGIN: ${WEBSITE_ORIGIN:-http://localhost:5175}
      RUST_LOG: info
    volumes:
      - server-data:/data

volumes:
  server-data:
