services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gotion
      POSTGRES_USER: gotion
      POSTGRES_PASSWORD: gotion_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotion"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://gotion:gotion_dev@db:5432/gotion
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
