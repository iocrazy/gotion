services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: sqlite:/data/gotion.db?mode=rwc
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RUST_LOG: info
    volumes:
      - server-data:/data

volumes:
  server-data:
