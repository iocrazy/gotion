name: Build & Release Desktop Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.2.1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './client/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          releaseName: 'Gotion ${{ github.ref_type == ''tag'' && github.ref_name || inputs.version }}'
          releaseBody: |
            ## Gotion Desktop ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}

            ### Downloads
            - **macOS** (Apple Silicon): `.dmg`
            - **Ubuntu/Linux**: `.deb` / `.AppImage`
            - **Windows**: `.msi` / `.exe`

            ### What's Changed
            See [full changelog](https://github.com/${{ github.repository }}/compare/v0.2.0...${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}) for details.
          releaseDraft: false
          prerelease: false
