name: Deploy Server to NAS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'deploy/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gotion-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose file to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_SSH_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          source: "deploy/docker-compose.nas.yml"
          target: ${{ secrets.NAS_DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_SSH_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            cd ${{ secrets.NAS_DEPLOY_PATH }}
            # Remove legacy compose file if exists
            rm -f docker-compose.yml
            # Update RESEND_FROM in .env to use verified domain
            if [ -f .env ]; then
              sed -i 's|RESEND_FROM=.*|RESEND_FROM=Gotion <noreply@gotion.heygo.cn>|' .env
              sed -i 's|WEBSITE_ORIGIN=.*|WEBSITE_ORIGIN=https://gotion.pages.dev,http://localhost:5173,tauri://localhost|' .env
            else
              cat > .env << 'ENVEOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM=Gotion <noreply@gotion.heygo.cn>
            SERVER_URL=https://gotion.heygo.cn:88
            WEBSITE_ORIGIN=https://gotion.pages.dev
            XUNHU_APPID=${{ secrets.XUNHU_APPID }}
            XUNHU_APPSECRET=${{ secrets.XUNHU_APPSECRET }}
            XUNHU_NOTIFY_URL=${{ secrets.XUNHU_NOTIFY_URL }}
            ENVEOF
            fi
            sudo docker compose -f docker-compose.nas.yml up -d --force-recreate
            sleep 5
            echo "=== Container status ==="
            sudo docker ps -a --filter name=gotion
            echo "=== Early logs (first poll start) ==="
            sudo docker logs gotion-server --tail 30 2>&1 || true
            echo "=== Waiting for first sync cycle (35s) ==="
            sleep 35
            echo "=== Full sync logs ==="
            sudo docker logs gotion-server --tail 80 2>&1 || true
            sudo docker image prune -f || true
