name: Deploy Server to NAS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'deploy/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gotion-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_SSH_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            cd ${{ secrets.NAS_DEPLOY_PATH }}
            echo "=== Current compose file ==="
            cat docker-compose.yml || cat docker-compose.nas.yml || echo "No compose file found"
            echo "=== Docker compose up ==="
            sudo docker compose up -d --force-recreate
            sleep 5
            echo "=== Container status ==="
            sudo docker ps -a --filter name=gotion
            echo "=== Container logs (last 30 lines) ==="
            sudo docker logs gotion-server --tail 30 2>&1 || true
            sudo docker image prune -f || true
